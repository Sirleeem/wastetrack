{% extends "base.html" %}
{% block title %}Sign in - WasteTrack{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="panel">
    <div class="panel-header">
      <h2>Sign in</h2>
    </div>
    <div class="panel-body">
      <p class="text-secondary small mb-3">Use your resident, officer, or admin account.</p>
      <form method="post" novalidate>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-control form-control-lg" id="email" name="email" required autofocus autocomplete="username" inputmode="email" placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-control form-control-lg" id="password" name="password" required autocomplete="current-password">
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" value="1" id="remember" name="remember">
          <label class="form-check-label" for="remember">Keep me signed in on this device</label>
        </div>
        <button type="submit" class="btn btn-wm btn-lg w-100">Sign in</button>
      </form>
      <p class="text-center text-secondary small mt-3 mb-0">
        New resident? <a href="{{ url_for('auth.register') }}">Create an account</a>
      </p>
      <p class="text-center text-secondary small mt-2 mb-0">
        Admin or officer?
        <a href="{{ url_for('auth.setup') }}">Create staff account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
