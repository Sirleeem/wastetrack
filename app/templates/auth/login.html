{% extends "base.html" %}
{% block title %}Login — WasteTrack{% endblock %}
{% block content %}
<div class="auth-card panel">
  <div class="panel-header"><h2>Login</h2></div>
  <div class="panel-body">
    <form method="post" novalidate>
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" required autofocus placeholder="you@example.com">
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" value="1" id="remember" name="remember">
        <label class="form-check-label" for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-wm w-100">Sign in</button>
    </form>
    <p class="text-center text-secondary small mt-3 mb-0">
      New resident? <a href="{{ url_for('auth.register') }}">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
