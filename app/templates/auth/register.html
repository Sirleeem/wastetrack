{% extends "base.html" %}
{% block title %}Register — WasteTrack{% endblock %}
{% block content %}
<div class="auth-card panel">
  <div class="panel-header"><h2>Resident registration</h2></div>
  <div class="panel-body">
    <form method="post" novalidate>
      <div class="mb-3">
        <label class="form-label" for="name">Full name</label>
        <input type="text" class="form-control" id="name" name="name" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="phone">Phone (optional)</label>
        <input type="text" class="form-control" id="phone" name="phone">
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password" required minlength="6">
      </div>
      <div class="mb-3">
        <label class="form-label" for="confirm">Confirm password</label>
        <input type="password" class="form-control" id="confirm" name="confirm" required minlength="6">
      </div>
      <button type="submit" class="btn btn-wm w-100">Create account</button>
    </form>
    <p class="text-center text-secondary small mt-3 mb-0">
      Already registered? <a href="{{ url_for('auth.login') }}">Login</a>
    </p>
  </div>
</div>
{% endblock %}
