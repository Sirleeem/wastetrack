{% extends "base.html" %}
{% block title %}Register - WasteTrack{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="panel">
    <div class="panel-header">
      <h2>Create resident account</h2>
    </div>
    <div class="panel-body">
      <form method="post" novalidate>
        <div class="mb-3">
          <label class="form-label" for="name">Full name</label>
          <input type="text" class="form-control form-control-lg" id="name" name="name" required autocomplete="name">
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-control form-control-lg" id="email" name="email" required autocomplete="email" inputmode="email">
        </div>
        <div class="mb-3">
          <label class="form-label" for="phone">Phone (optional)</label>
          <input type="tel" class="form-control form-control-lg" id="phone" name="phone" autocomplete="tel" inputmode="tel">
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-control form-control-lg" id="password" name="password" required minlength="6" autocomplete="new-password">
        </div>
        <div class="mb-3">
          <label class="form-label" for="confirm">Confirm password</label>
          <input type="password" class="form-control form-control-lg" id="confirm" name="confirm" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-wm btn-lg w-100">Create account</button>
      </form>
      <p class="text-center text-secondary small mt-3 mb-0">
        Already registered? <a href="{{ url_for('auth.login') }}">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
